server:
  shutdown: graceful
  lifecycle:
    timeout-per-shutdown-phase: 30s

  port: 8080
spring:
  application:
    name: smart-interview-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
