version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: smart-interview-mysql
    ports: ["3307:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smart_interview
    volumes: [mysql-data:/var/lib/mysql]
    restart: unless-stopped
    healthcheck: {test: ["CMD","mysqladmin","ping","-h","localhost"], interval: 10s, timeout: 5s, retries: 3}
  redis:
    image: redis:7-alpine
    container_name: smart-interview-redis
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    restart: unless-stopped
    healthcheck: {test: ["CMD","redis-cli","ping"], interval: 10s, timeout: 3s, retries: 3}
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smart-interview-rabbitmq
    ports: ["5672:5672","15672:15672"]
    environment: {RABBITMQ_DEFAULT_USER: admin, RABBITMQ_DEFAULT_PASS: admin}
    restart: unless-stopped
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: smart-interview-nacos
    ports: ["8848:8848","9848:9848"]
    environment: {MODE: standalone}
    restart: unless-stopped
volumes:
  mysql-data:
  redis-data:
